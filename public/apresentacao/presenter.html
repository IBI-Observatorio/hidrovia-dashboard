<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Observatório IBI — Apresentação CTLOG</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
<style>
  :root {
    --azul: #0099d8;
    --verde: #00a652;
    --escuro: #2c2c2c;
    --fundo: #0b1220;
    --fundo2: #111827;
    --texto: #f8fafc;
    --suave: #94a3b8;
    --grad: linear-gradient(90deg, var(--verde) 0%, var(--azul) 100%);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: "Geist", "Inter", system-ui, sans-serif;
    background: radial-gradient(1200px 800px at 70% -10%, #16233b 0%, var(--fundo) 60%);
    color: var(--texto);
    cursor: none;
  }
  body.mostra-cursor { cursor: default; }

  /* ----- camada de slides ----- */
  #deck { position: fixed; inset: 0; }
  .slide {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; justify-content: center;
    padding: clamp(40px, 7vw, 120px);
    opacity: 0; transform: translateY(24px) scale(.99);
    transition: opacity .5s ease, transform .5s ease;
    pointer-events: none;
  }
  .slide.ativo { opacity: 1; transform: none; pointer-events: auto; }

  .kicker {
    font-size: clamp(13px, 1.2vw, 18px); font-weight: 700; letter-spacing: .28em;
    text-transform: uppercase; color: var(--azul); margin-bottom: 28px;
  }
  .slide h1 {
    font-size: clamp(40px, 6.4vw, 104px); font-weight: 800; line-height: 1.02;
    letter-spacing: -.02em; max-width: 16ch;
  }
  .slide h1 .grad {
    background: var(--grad); -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .slide .sub {
    margin-top: 28px; font-size: clamp(18px, 2.1vw, 34px); font-weight: 500;
    color: var(--suave); max-width: 30ch; line-height: 1.35;
  }
  .slide .corpo {
    margin-top: 32px; font-size: clamp(20px, 2.4vw, 40px); font-weight: 500;
    line-height: 1.4; max-width: 26ch;
  }
  /* slide denso: cabe mais texto — padding vertical menor (por altura) e fontes menores */
  .slide.denso { padding-top: clamp(18px, 3.5vh, 50px); padding-bottom: clamp(18px, 3.5vh, 50px); }
  .slide.denso .barra-top { margin-bottom: clamp(12px, 2.4vh, 28px); }
  .slide.denso .kicker { margin-bottom: clamp(10px, 2vh, 20px); }
  .slide.denso h1 { font-size: clamp(26px, 3.6vw, 52px); max-width: 28ch; line-height: 1.05; }
  .slide.denso .corpo { margin-top: clamp(14px, 2.2vh, 22px); font-size: clamp(15px, 1.55vw, 24px); max-width: 46ch; }
  .barra-top { height: 6px; width: 0; background: var(--grad); border-radius: 999px; margin-bottom: 40px; }
  .ativo .barra-top { width: clamp(120px, 16vw, 280px); transition: width .7s ease .15s; }

  /* verticais */
  .verticais { display: grid; grid-template-columns: repeat(2, 1fr); gap: clamp(16px, 2vw, 28px); margin-top: 44px; max-width: 1100px; }
  .vert {
    border: 1px solid rgba(255,255,255,.10); border-left: 5px solid var(--azul);
    background: rgba(255,255,255,.03); border-radius: 14px;
    padding: clamp(20px, 2.4vw, 38px); font-size: clamp(22px, 2.6vw, 44px); font-weight: 700;
  }
  .vert small { display: block; font-size: clamp(13px, 1.1vw, 18px); font-weight: 500; color: var(--suave); margin-top: 6px; letter-spacing: .04em; }
  .vert:nth-child(1){ border-left-color: var(--azul);}
  .vert:nth-child(2){ border-left-color: var(--verde);}
  .vert:nth-child(3){ border-left-color: #38bdf8;}
  .vert:nth-child(4){ border-left-color: #a78bfa;}

  /* capa + qr */
  .capa-wrap { display: flex; align-items: center; justify-content: space-between; gap: 60px; width: 100%; }
  .qr-box { text-align: center; flex-shrink: 0; }
  .qr-box img { width: clamp(180px, 18vw, 300px); height: auto; border-radius: 16px; background: #fff; padding: 14px; display: block; }
  .qr-box .qr-cap { margin-top: 16px; font-size: 15px; color: var(--suave); font-weight: 600; letter-spacing: .04em; }
  .qr-box .qr-url { margin-top: 6px; font-size: 13px; color: var(--azul); word-break: break-all; max-width: 320px; }

  .demo-pulse { margin-top: 40px; display: inline-flex; align-items: center; gap: 14px; font-size: clamp(16px, 1.6vw, 24px); color: var(--verde); font-weight: 700; }
  .demo-pulse .dot { width: 14px; height: 14px; border-radius: 50%; background: var(--verde); box-shadow: 0 0 0 0 rgba(0,166,82,.6); animation: pulse 1.6s infinite; }
  @keyframes pulse { 0%{box-shadow:0 0 0 0 rgba(0,166,82,.6)} 70%{box-shadow:0 0 0 22px rgba(0,166,82,0)} 100%{box-shadow:0 0 0 0 rgba(0,166,82,0)} }

  /* rodapé fixo: progresso + contador */
  .rodape { position: fixed; left: 0; right: 0; bottom: 0; height: 5px; background: rgba(255,255,255,.06); z-index: 5; }
  .rodape .fill { height: 100%; background: var(--grad); width: 0; transition: width .4s ease; }
  .contador { position: fixed; bottom: 22px; right: 30px; font-size: 14px; color: var(--suave); font-weight: 600; letter-spacing: .08em; z-index: 6; }

  /* ----- camada de feature (iframe) ----- */
  #palco-feature {
    position: fixed; inset: 0; z-index: 20; background: #000;
    opacity: 0; pointer-events: none; transition: opacity .35s ease;
  }
  body.feature #palco-feature { opacity: 1; pointer-events: auto; }
  #palco-feature iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; background: var(--fundo2); }
  .feat-bar {
    position: absolute; top: 0; left: 0; right: 0; height: 0; overflow: hidden;
    background: rgba(11,18,32,.92); backdrop-filter: blur(6px);
    display: flex; align-items: center; gap: 12px; padding: 0 18px; z-index: 2;
    transition: height .25s ease; font-size: 14px; color: var(--suave);
  }
  #palco-feature.show-bar .feat-bar { height: 42px; }
  .feat-bar .live { display: inline-flex; align-items: center; gap: 8px; color: var(--verde); font-weight: 700; }
  .feat-bar .live .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--verde); animation: pulse 1.6s infinite; }

  /* blackout */
  body.blackout #deck, body.blackout #palco-feature { opacity: 0 !important; transition: opacity .3s; }
  #blackout-layer { position: fixed; inset: 0; background: #000; z-index: 40; opacity: 0; pointer-events: none; transition: opacity .3s; }
  body.blackout #blackout-layer { opacity: 1; }

  /* status de conexão (canto) */
  .conn { position: fixed; top: 18px; right: 22px; z-index: 50; display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--suave); font-weight: 600; opacity: .55; }
  .conn .dot { width: 9px; height: 9px; border-radius: 50%; background: #ef4444; }
  .conn.ok .dot { background: var(--verde); }

  /* ===== Slides IEE (deck importado, em frame 16:9 centralizado) ===== */
  .slide.iee-wrap { padding: 2.2vh 2vw; align-items: center; justify-content: center; }
  .iee-frame{
    --iee-marinho:#0A1A4A; --iee-card:#11245C; --iee-branco:#FFFFFF;
    --iee-cinza:#B8C2DD; --iee-cinza-fraco:#8A95B5; --iee-ouro:#D4922A;
    --iee-verde:#00A652; --iee-azul:#0099D8; --iee-vermelho:#A0153E;
    --iee-linha:rgba(255,255,255,0.10);
    position:relative; width:min(94vw, calc(88vh * 16 / 9)); aspect-ratio:16/9;
    margin:auto; background:var(--iee-marinho); color:var(--iee-branco);
    border-radius:14px; overflow:hidden; container-type:inline-size;
    font-family:"Inter","Geist",system-ui,sans-serif; line-height:1.4;
    padding:5.2cqw 6cqw; display:flex; flex-direction:column; justify-content:center;
    box-shadow:0 18px 50px rgba(0,0,0,.35);
  }
  .iee-frame *{margin:0;padding:0;box-sizing:border-box}
  .iee-frame .iee-kicker{font-size:1.25cqw;letter-spacing:.22em;font-weight:700;text-transform:uppercase;color:var(--iee-ouro);margin-bottom:1.6cqw}
  .iee-frame .iee-kicker.iee-mut{color:var(--iee-cinza-fraco)}
  .iee-frame .iee-h1{font-size:5.2cqw;font-weight:900;letter-spacing:.01em;line-height:1.05;text-transform:uppercase}
  .iee-frame .iee-h2{font-size:3.1cqw;font-weight:800;letter-spacing:.01em;text-transform:uppercase;line-height:1.1}
  .iee-frame .iee-lead{font-size:1.95cqw;color:var(--iee-cinza);font-weight:500;margin-top:1.8cqw;max-width:80%}
  .iee-frame .iee-p{font-size:1.55cqw;color:var(--iee-cinza);line-height:1.45}
  .iee-frame .iee-strong{color:var(--iee-branco);font-weight:700}
  .iee-frame.iee-cover .iee-h1{font-size:6.4cqw}
  .iee-frame .iee-seal{display:inline-flex;align-items:center;gap:.8cqw;margin-top:3cqw;font-size:1.25cqw;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--iee-cinza);border:1px solid var(--iee-linha);border-radius:999px;padding:.9cqw 1.6cqw}
  .iee-frame .iee-seal .iee-dot{width:.9cqw;height:.9cqw;border-radius:50%;background:var(--iee-verde)}
  .iee-frame .iee-scale{display:flex;gap:.6cqw;margin-top:2.6cqw}
  .iee-frame .iee-seg{flex:1;text-align:center;border-radius:.6cqw;padding:1.2cqw .4cqw;color:var(--iee-marinho)}
  .iee-frame .iee-seg .iee-r{font-size:1.55cqw;font-weight:800}
  .iee-frame .iee-seg .iee-n{font-size:1.1cqw;font-weight:700;text-transform:uppercase;letter-spacing:.06em;display:block;margin-top:.3cqw}
  .iee-frame .iee-s1{background:var(--iee-verde)} .iee-frame .iee-s2{background:var(--iee-azul)}
  .iee-frame .iee-s3{background:var(--iee-ouro)} .iee-frame .iee-s4{background:var(--iee-vermelho);color:var(--iee-branco)}
  .iee-frame .iee-grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:1.4cqw;margin-top:2.6cqw}
  .iee-frame .iee-grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:1.4cqw;margin-top:2.6cqw}
  .iee-frame .iee-card{background:var(--iee-card);border-radius:.9cqw;padding:1.9cqw;border-top:.25cqw solid var(--iee-azul)}
  .iee-frame .iee-card h3{font-size:1.55cqw;font-weight:800;text-transform:uppercase;letter-spacing:.03em;margin-bottom:.8cqw}
  .iee-frame .iee-card p{font-size:1.3cqw;color:var(--iee-cinza);line-height:1.42}
  .iee-frame .iee-card .iee-ic{display:block;width:3.2cqw;height:3.2cqw;margin-bottom:1.1cqw;color:var(--iee-azul)}
  .iee-frame .iee-card .iee-ic svg{width:100%;height:100%;display:block}
  .iee-frame .iee-card.iee-hl{border-top-color:var(--iee-ouro)}
  .iee-frame .iee-card.iee-hl .iee-ic{color:var(--iee-ouro)}
  .iee-frame .iee-tag{display:inline-block;font-size:.95cqw;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--iee-ouro);margin-top:.8cqw}
  .iee-frame .iee-seal-card{background:var(--iee-card);border-radius:.9cqw;padding:2cqw;border-top:.25cqw solid var(--iee-verde)}
  .iee-frame .iee-seal-card .iee-lock{display:block;width:3cqw;height:3cqw;margin-bottom:1.1cqw;color:var(--iee-verde)}
  .iee-frame .iee-seal-card .iee-lock svg{width:100%;height:100%;display:block}
  .iee-frame .iee-seal-card h3{font-size:1.5cqw;font-weight:800;text-transform:uppercase;letter-spacing:.03em;margin-bottom:.8cqw}
  .iee-frame .iee-seal-card p{font-size:1.25cqw;color:var(--iee-cinza);line-height:1.45}
  .iee-frame .iee-results{margin-top:2.4cqw;display:flex;flex-direction:column;gap:1.4cqw}
  .iee-frame .iee-row{display:grid;grid-template-columns:15cqw 9cqw 1fr;align-items:center;gap:2cqw;background:var(--iee-card);border-radius:.9cqw;padding:1.7cqw 2cqw;border-left:.35cqw solid var(--iee-cinza-fraco)}
  .iee-frame .iee-row.iee-forte{border-left-color:var(--iee-verde)}
  .iee-frame .iee-row.iee-fraco{border-left-color:var(--iee-vermelho)}
  .iee-frame .iee-row.iee-outro{border-left-color:var(--iee-azul)}
  .iee-frame .iee-corr{font-size:2.1cqw;font-weight:800;text-transform:uppercase;letter-spacing:.02em}
  .iee-frame .iee-badge{font-size:1.15cqw;font-weight:800;letter-spacing:.05em;text-transform:uppercase;text-align:center;padding:.7cqw .5cqw;border-radius:.5cqw}
  .iee-frame .iee-b-forte{background:rgba(0,166,82,.16);color:var(--iee-verde);border:1px solid rgba(0,166,82,.5)}
  .iee-frame .iee-b-fraco{background:rgba(160,21,62,.16);color:#E8607F;border:1px solid rgba(160,21,62,.55)}
  .iee-frame .iee-b-outro{background:rgba(0,153,216,.16);color:var(--iee-azul);border:1px solid rgba(0,153,216,.5)}
  .iee-frame .iee-row .iee-desc{font-size:1.3cqw;color:var(--iee-cinza);line-height:1.42}
  .iee-frame .iee-bar{height:.9cqw;border-radius:999px;background:rgba(255,255,255,.10);margin-top:.9cqw;overflow:hidden}
  .iee-frame .iee-bar span{display:block;height:100%;border-radius:999px}
  .iee-frame .iee-bar .iee-fill-forte{width:80%;background:var(--iee-verde)}
  .iee-frame .iee-bar .iee-fill-fraco{width:28%;background:var(--iee-vermelho)}
  .iee-frame .iee-bar .iee-fill-outro{width:100%;background:linear-gradient(90deg,var(--iee-azul),rgba(0,153,216,.25))}
  .iee-frame .iee-timeline{display:flex;align-items:center;gap:1.4cqw;margin-top:3cqw}
  .iee-frame .iee-node{flex:1;background:var(--iee-card);border-radius:.9cqw;padding:1.7cqw;text-align:center}
  .iee-frame .iee-node .iee-when{font-size:1.1cqw;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--iee-ouro)}
  .iee-frame .iee-node .iee-what{font-size:1.4cqw;color:var(--iee-cinza);margin-top:.8cqw;line-height:1.4}
  .iee-frame .iee-arrow{font-size:2.6cqw;color:var(--iee-cinza-fraco);font-weight:300}
  .iee-frame .iee-tech{margin-top:2.4cqw;display:grid;grid-template-columns:1fr 1fr;gap:1.6cqw}
  .iee-frame .iee-tech .iee-block{background:var(--iee-card);border-radius:.9cqw;padding:1.8cqw}
  .iee-frame .iee-tech h3{font-size:1.3cqw;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--iee-ouro);margin-bottom:.9cqw}
  .iee-frame .iee-tech p{font-size:1.2cqw;color:var(--iee-cinza);line-height:1.5}
  .iee-frame .iee-tech .iee-nums{display:flex;gap:2.2cqw;margin-top:.8cqw}
  .iee-frame .iee-tech .iee-nums b{display:block;font-size:2.4cqw;font-weight:800;color:var(--iee-branco)}
  .iee-frame .iee-tech .iee-nums small{font-size:1cqw;color:var(--iee-cinza-fraco);text-transform:uppercase;letter-spacing:.06em}
  .iee-frame .iee-foot{font-size:1.05cqw;color:var(--iee-cinza-fraco);margin-top:1.8cqw;line-height:1.5}
</style>
</head>
<body>
  <div class="conn" id="conn"><span class="dot"></span><span id="conn-txt">conectando…</span></div>

  <div id="deck"></div>

  <div id="palco-feature">
    <div class="feat-bar"><span class="live"><span class="dot"></span>AO VIVO</span><span id="feat-nome"></span><span style="margin-left:auto">controle no celular ← voltar aos slides</span></div>
    <iframe id="frame" referrerpolicy="no-referrer"></iframe>
  </div>

  <div id="blackout-layer"></div>
  <div class="rodape"><div class="fill" id="fill"></div></div>
  <div class="contador" id="contador"></div>

<script>
/* ===================== CONTEÚDO DO DECK (edite à vontade) ===================== */
const SLIDES = [
  { kind: "capa",
    titulo: ["Observatório de", "<span class='grad'>Infraestrutura</span> de Transporte"],
    sub: "Dados, em tempo quase real, sobre a logística brasileira.",
    kicker: "IBI · Instituto Brasileiro de Infraestrutura" },

  { kind: "texto", kicker: "O que é",
    titulo: ["Um painel <span class='grad'>vivo</span>."],
    corpo: "Transforma dados públicos dispersos — ANA, ANTAQ, Comex, SGB — em uma leitura de banco central sobre a infraestrutura brasileira." },

  { kind: "verticais", kicker: "Cobertura",
    titulo: ["Quatro verticais", "<span class='grad'>+ ferrovia</span> emergindo"],
    itens: [
      ["Porto", "movimentação · PortGDP"],
      ["Navegação", "rotas · rentabilidade"],
      ["Hidrologia", "réguas · IRC · IDN"],
      ["Aéreo", "tarifa · demanda"],
    ] },

  { kind: "texto", kicker: "Indicadores próprios",
    titulo: ["Métricas que <span class='grad'>não existem</span> em outro lugar."],
    corpo: "PortGDP · IRC · IDN · Calendário LWS · modelo de recessão da hidrovia — construídos do dado bruto." },

  { kind: "texto", kicker: "A pegada",
    titulo: ["Não o número.", "O <span class='grad'>porquê.</span>"],
    corpo: "Tom sóbrio, data-driven, separando sempre o dado oficial da estimativa do IBI." },

  { kind: "texto", denso: true, kicker: "Projeto em desenvolvimento · Porto de Santos",
    titulo: ["Agendamento <span class='grad'>automático</span> de caminhões"],
    corpo: "Entrada agendada nos terminais molhados: caminhão sincronizado à operação do berço — menos fila, menos demurrage, gate previsível." },

  // ===== Deck IEE — Índice de Estresse de Escoamento (importado) =====
  { kind: "iee", frameClass: "iee-cover", html: `
    <div class="iee-kicker">Observatório de Infraestrutura · IBI</div>
    <h1 class="iee-h1">IEE<br>Índice de Estresse<br>de Escoamento</h1>
    <p class="iee-lead">Mede o aperto no escoamento de grãos e <span class="iee-strong">antecipa a fila de navios</span> nos portos.</p>
    <span class="iee-seal"><span class="iee-dot"></span> Boletim metodológico · como calculamos, o quanto acerta, os limites</span>` },

  { kind: "iee", html: `
    <div class="iee-kicker">O que é</div>
    <h2 class="iee-h2">Uma nota de 0 a 100, por porto, toda semana</h2>
    <p class="iee-lead">Quanto maior a nota, mais apertado o escoamento. Ela é calibrada para <span class="iee-strong">avisar ~2 semanas antes</span> de a fila de navios apertar.</p>
    <div class="iee-scale">
      <div class="iee-seg iee-s1"><span class="iee-r">0–25</span><span class="iee-n">Fluido</span></div>
      <div class="iee-seg iee-s2"><span class="iee-r">25–50</span><span class="iee-n">Atenção</span></div>
      <div class="iee-seg iee-s3"><span class="iee-r">50–75</span><span class="iee-n">Pressão</span></div>
      <div class="iee-seg iee-s4"><span class="iee-r">75–100</span><span class="iee-n">Crítico</span></div>
    </div>` },

  { kind: "iee", html: `
    <div class="iee-kicker">Como calculamos · os pilares</div>
    <h2 class="iee-h2">Quatro forças por corredor</h2>
    <div class="iee-grid4">
      <div class="iee-card">
        <span class="iee-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="5" r="2"/><path d="M12 7v13"/><path d="M8 11h8"/><path d="M5 13a7 7 0 0 0 14 0"/><path d="M5 13H3m16 0h2"/></svg></span>
        <h3>Fila</h3><p>Quantos navios estão chegando ao porto.</p>
      </div>
      <div class="iee-card">
        <span class="iee-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3 4 21"/><path d="m18 3 2 18"/><path d="M12 3v3"/><path d="M12 10v3"/><path d="M12 17v3"/></svg></span>
        <h3>Custo da rota</h3><p>O quanto custa levar a carga até o porto.</p>

  { kind: "iee", html: `

    <div class="iee-kicker">Resultados · o quanto acerta</div>

  { kind: "iee", html: `
    <div class="iee-kicker iee-mut">Como lemos isso · nota técnica</div>

    <p class="iee-foot">Fontes: ANTAQ (fila e chegadas), Conab (safra), ANP (diesel), Comex Stat/MDIC (origem→porto).</p>` },

  { kind: "demo", kicker: "Demonstração",
    titulo: ["Agora, <span class='grad'>ao vivo.</span>"],
    sub: "Pegue o celular — vamos abrir o Observatório de verdade." },

/* rotas que o controle pode abrir (iframe = mesma origem → X-Frame-Options SAMEORIGIN ok) */
const FEATURES = {
  monitor:   { url: "/monitor",                 nome: "Monitor Hidrológico" },
  caso2024:  { url: "/caso-2024",               nome: "Caso 2024 — a seca" },
  agro:      { url: "/agro",                     nome: "Agro Radar" },
  lws:       { url: "/calendario-lws-2026",      nome: "Calendário LWS 2026" },
  portos:    { url: "/portos/movimentacao",      nome: "Portos — movimentação" },
  navegacao: { url: "/navegacao",                nome: "Navegação" },
  sobrecusto:{ url: "/sobrecusto-rodoviario",    nome: "Sobrecusto rodoviário" },
  radar:     { url: "/radar",                    nome: "Radar ferroviário" },
  antaq:     { url: "/relatorio-antaq",          nome: "Relatório ANTAQ" },
  briefing:  { url: "/briefing-semanal",         nome: "Briefing semanal" },
  home:      { url: "/",                          nome: "Home" },
};

/* canal do relay interno — o MESMO precisa estar no controle do celular */
const CANAL = new URLSearchParams(location.search).get("canal") || "obs-ibi-ctlog";
/* ============================================================================= */

const deck = document.getElementById("deck");
const frame = document.getElementById("frame");
const palco = document.getElementById("palco-feature");
const featNome = document.getElementById("feat-nome");
const fill = document.getElementById("fill");
const contador = document.getElementById("contador");
const conn = document.getElementById("conn");
const connTxt = document.getElementById("conn-txt");

/* estado autoritativo (vive no telão) */
const estado = { slide: 0, mode: "slides", feature: null };

/* ---- monta os slides uma vez ---- */
function montar() {
  SLIDES.forEach((s) => {
    const el = document.createElement("section");
    el.className = "slide";
    if (s.kind === "iee") { // slide importado do deck IEE (frame 16:9)
      el.classList.add("iee-wrap");
      el.innerHTML = `<div class="iee-frame ${s.frameClass || ""}">${s.html}</div>`;
      deck.appendChild(el);
      return;
    }
    if (s.denso) el.classList.add("denso");
    const tit = (s.titulo || []).map((l) => `<span>${l}</span>`).join("<br/>");
    let extra = "";
    if (s.kind === "verticais") {
      extra = `<div class="verticais">` + s.itens.map((i) =>
        `<div class="vert">${i[0]}<small>${i[1]}</small></div>`).join("") + `</div>`;
    }
    if (s.corpo) extra += `<p class="corpo">${s.corpo}</p>`;
    if (s.sub && s.kind !== "capa") extra += `<p class="sub">${s.sub}</p>`;
    if (s.kind === "demo") extra += `<div class="demo-pulse"><span class="dot"></span>controle ativo no celular</div>`;

    if (s.kind === "capa") {
      el.innerHTML = `<div class="barra-top"></div><div class="kicker">${s.kicker || ""}</div><h1>${tit}</h1><p class="sub">${s.sub || ""}</p>`;
    } else {
      el.innerHTML = `<div class="barra-top"></div><div class="kicker">${s.kicker || ""}</div><h1>${tit}</h1>${extra}`;
    }
    deck.appendChild(el);
  });
}
montar();
const slides = [...deck.querySelectorAll(".slide")];

let slideAtual = -1;
function irParaSlide(i) {
  i = Math.max(0, Math.min(slides.length - 1, i));
  slideAtual = i;
  slides.forEach((el, idx) => el.classList.toggle("ativo", idx === i));
  fill.style.width = ((i + 1) / slides.length * 100) + "%";
  contador.textContent = (i + 1) + " / " + slides.length;
}

/* ---- aplica o estado atual na tela ---- */
function render() {
  document.body.classList.toggle("blackout", estado.mode === "blackout");
  if (estado.mode === "feature" && estado.feature) {
    const f = FEATURES[estado.feature] || { url: estado.feature, nome: estado.feature };
    if (frame.dataset.src !== f.url) { frame.dataset.src = f.url; frame.src = f.url; }
    featNome.textContent = f.nome;
    document.body.classList.add("feature");
  } else {
    pararScroll(); // saiu da feature → garante que o loop de scroll não continue
    document.body.classList.remove("feature");
    if (estado.mode !== "blackout") irParaSlide(estado.slide);
  }
}

/* ---- rolagem por toque: desliza ~85% da tela a ritmo fixo e PARA no alvo ---- */
let _animTimer = 0, _alvoScroll = null, _animUltimo = 0;
const SCROLL_PASSO = 0.85; // fração da altura visível por toque
const SCROLL_VEL = 1600;   // px/s do deslize até o alvo (suave, mas não devagar)

function animarScroll(dir, n) {
  if (estado.mode !== "feature") return;
  let win;
  try { win = frame.contentWindow; if (!win) return; } catch (e) { return; }
  const sentido = dir < 0 ? -1 : 1;
  const atual = win.scrollY || 0;
  // mesma direção e ainda animando → acumula a partir do alvo (aceleração);
  // direção nova/parado → ancora na posição real (inversão sempre correta).
  const base = (_alvoScroll != null && Math.sign(_alvoScroll - atual) === sentido) ? _alvoScroll : atual;
  _alvoScroll = Math.max(0, base + (win.innerHeight || window.innerHeight) * SCROLL_PASSO * sentido * n);
  if (_animTimer) return; // já animando — alvo atualizado (toques acumulam)
  _animUltimo = Date.now();
  _animTimer = setInterval(() => {
    let w;
    try { w = frame.contentWindow; if (!w) throw 0; } catch (e) { pararScroll(); return; }
    const agora = Date.now();
    const dt = Math.min(0.1, (agora - _animUltimo) / 1000); _animUltimo = agora;
    const cur = w.scrollY || 0;
    const dif = _alvoScroll - cur;
    const passo = SCROLL_VEL * dt;
    if (Math.abs(dif) <= passo + 1) { try { w.scrollTo(0, _alvoScroll); } catch (e) {} pararScroll(); return; }
    try { w.scrollBy(0, Math.sign(dif) * passo); } catch (e) {}
  }, 16);
}
function pararScroll() {
  clearInterval(_animTimer);
  _animTimer = 0; _alvoScroll = null;
}

/* ===================== TRANSPORTE: polling do relay interno ===================== */
const API = "/api/apresentacao?canal=" + encodeURIComponent(CANAL);

/* o telão espelha o estado do servidor (autoritativo) */
let rev = -1, falhas = 0, _scrollSeqVisto = null;
async function tick() {
  try {
    const e = await (await fetch(API, { cache: "no-store" })).json();
    falhas = 0; conn.classList.add("ok"); connTxt.textContent = "conectado · canal: " + CANAL;
    if (e.rev !== rev) {
      rev = e.rev;
      estado.mode = e.mode; estado.slide = e.slide; estado.feature = e.feature;
      render();
    }
    // rolagem por contador idempotente (atraso de rede não dispara nem acumula sozinho)
    if (_scrollSeqVisto === null) _scrollSeqVisto = e.scrollSeq;
    else if (e.scrollSeq !== _scrollSeqVisto) {
      const n = e.scrollSeq - _scrollSeqVisto;
      _scrollSeqVisto = e.scrollSeq;
      if (n > 0 && estado.mode === "feature") animarScroll(e.scrollDir, n);
    }
  } catch (err) {
    if (++falhas > 2) { conn.classList.remove("ok"); connTxt.textContent = "reconectando…"; }
  }
}
setInterval(tick, 200);
tick();
render();

/* envia um comando para o servidor (teclado = plano B) */
function enviar(action, extra = {}) {
  fetch(API, {
    method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ action, total: SLIDES.length, ...extra }),
  }).then(() => tick()).catch(() => {});
}

/* ---- atalhos de teclado (plano B se o celular cair) ---- */
addEventListener("keydown", (ev) => {
  switch (ev.key) {
    case "ArrowRight": case "PageDown": case " ": enviar("next"); break;
    case "ArrowLeft": case "PageUp": enviar("prev"); break;
    case "Home": enviar("goto", { slide: 0 }); break;
    case "b": case "B": enviar("blackout"); break;
    case "Escape": enviar("slides"); break;
    case "f": case "F":
      if (!document.fullscreenElement) document.documentElement.requestFullscreen();
      else document.exitFullscreen();
      break;
  }
});

/* mostra a barrinha "AO VIVO" e o cursor quando o mouse mexe */
let mt;
addEventListener("mousemove", () => {
  document.body.classList.add("mostra-cursor");
  palco.classList.add("show-bar");
  clearTimeout(mt);
  mt = setTimeout(() => { document.body.classList.remove("mostra-cursor"); palco.classList.remove("show-bar"); }, 2500);
});
</script>
