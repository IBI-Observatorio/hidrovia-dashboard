name: Insights AI diario

# Gatilho agendado dos Insights Automáticos (Claude Haiku 4.5). A geração roda no
# servidor (rota /api/cron/insights no Railway): busca níveis + IDN ao vivo, chama
# o Claude e grava o cache no volume DATA_DIR. Este workflow só DISPARA a rota —
# não gera nada por conta própria. Substitui o passo gera-insights-ai.mjs do
# run-pipeline-sace.bat, que rodava só na máquina local. Ver docs/RUNBOOK-DADOS.md.
#
# Cadência: diário 14:00 UTC (11:00 em Brasília UTC-3 / 10:00 em Manaus UTC-4).
# Roda APÓS o reguas-diario (13:00 UTC) para garantir dados frescos da ANA.
# Também roda sob demanda pelo botão "Run workflow" (workflow_dispatch).
#
# Pré-requisitos:
#   - Secret do repositório CRON_SECRET (mesmo valor da var CRON_SECRET no Railway)
#   - Vars no service web do Railway: CRON_SECRET e ANTHROPIC_API_KEY
#   - ⚠️ O agendamento (schedule) só dispara quando este arquivo está na branch
#     padrão (main). Em outras branches só funciona o "Run workflow" manual.

on:
  schedule:
    - cron: "0 14 * * *"
  workflow_dispatch:

# Uma execução por vez.
concurrency:
  group: insights-semanal
  cancel-in-progress: false

jobs:
  dispara:
    runs-on: ubuntu-latest
    steps:
      - name: Dispara /api/cron/insights
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          # Domínio público do dashboard no Railway. Pode ser sobrescrito por uma
          # repo variable RAILWAY_PUBLIC_URL se o domínio mudar.
          BASE_URL: ${{ vars.RAILWAY_PUBLIC_URL || 'https://hidrovia-dashboard-production.up.railway.app' }}
        run: |
          set -euo pipefail
          if [ -z "${CRON_SECRET}" ]; then
            echo "::error::Secret CRON_SECRET não configurado no repositório."
            exit 1
          fi
          echo "POST ${BASE_URL}/api/cron/insights"
          # --retry-all-errors cobre cold start e o HTTP 500 ocasional do backend.
          http=$(curl -sS -o /tmp/resp.json -w "%{http_code}" \
            --retry 3 --retry-all-errors --retry-delay 15 --max-time 200 \
            -X POST -H "Authorization: Bearer ${CRON_SECRET}" \
            "${BASE_URL}/api/cron/insights")
          echo "HTTP ${http}"
          cat /tmp/resp.json || true
          echo
          if [ "${http}" != "200" ]; then
            echo "::error::Esperado HTTP 200, recebido ${http}."
            exit 1
          fi
