name: Refresh boletim SGB (SACE)

# Dispara /api/cron/refresh-sgb no Railway, que raspa a listagem de boletins do
# Amazonas no sgb.gov.br, baixa o PDF mais recente, parseia (parseBoletimSGB) e
# grava boletins_sgb_cache.json no volume DATA_DIR — de onde fetchPrevisao2026 le
# a previsao de cheia (home, /monitor, briefing). O Railway faz o fetch do SGB;
# este workflow so dispara.
#
# Cadencia: o SGB publica na terca, mas com horario IRREGULAR — ja saiu de 14h a
# 19h de Manaus (18:00–23:00 UTC) e, em jun/2026, so a noite (22h UTC), depois da
# janela do cron antigo. Por isso roda DE HORA EM HORA da terca-tarde ate quarta:
#   - terca  17:00–23:00 UTC (13h–19h Manaus) — janela tipica de publicacao
#   - quarta 00:00–21:00 UTC                  — rede de seguranca ate quarta
# Dedup por numero+data: passadas sem boletim novo retornam mudou=false e saem
# VERDES (inofensivas). Quem AVISA se a terca foi perdida e' o sistema imunologico
# (watchdog), via /api/health (checks.sgb fica ok:false acima de 8 dias de idade).
# Tambem roda sob demanda (workflow_dispatch).

on:
  schedule:
    - cron: "0 17-23 * * 2"   # terca 17:00–23:00 UTC (13h–19h Manaus)
    - cron: "0 0-21 * * 3"    # quarta 00:00–21:00 UTC (rede de seguranca)
  workflow_dispatch:

concurrency:
  group: sgb-semanal
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  dispara:
    runs-on: ubuntu-latest
    steps:
      - name: Dispara /api/cron/refresh-sgb
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          BASE_URL: ${{ vars.RAILWAY_PUBLIC_URL || 'https://hidrovia-dashboard-production.up.railway.app' }}
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          if [ -z "${CRON_SECRET}" ]; then
            echo "::error::Secret CRON_SECRET não configurado no repositório."
            exit 1
          fi

          echo "POST ${BASE_URL}/api/cron/refresh-sgb"
          http=$(curl -sS -o /tmp/resp.json -w "%{http_code}" \
            --retry 3 --retry-all-errors --retry-delay 20 --max-time 120 \
            -X POST -H "Authorization: Bearer ${CRON_SECRET}" \
            "${BASE_URL}/api/cron/refresh-sgb")
          echo "HTTP ${http}"
          cat /tmp/resp.json || true
          echo

          # HTTP != 200 = falha real do raspador/parser (SGB fora do ar, PDF
          # corrompido). Falha o run; se for a ultima passada da janela, o
          # watchdog tambem pega pela frescura do dado.
          if [ "${http}" != "200" ]; then
            echo "::error::Esperado HTTP 200, recebido ${http}."
            exit 1
          fi

          if [ "$(jq -r '.mudou' /tmp/resp.json)" = "true" ]; then
            echo "✅ Boletim novo carregado: $(jq -r '.mensagem' /tmp/resp.json)"
            # Fecha o alerta anterior (label boletim-sgb), se houver algum aberto.
            n=$(gh issue list --repo "${REPO}" --label boletim-sgb --state open \
                  --json number -q '.[0].number // empty')
            if [ -n "${n}" ]; then
              gh issue close "${n}" --repo "${REPO}" \
                --comment "✅ Boletim carregado em $(date -u +%FT%TZ): $(jq -r '.mensagem' /tmp/resp.json)"
            fi
            exit 0
          fi

          # Sem boletim novo nesta passada (dedup) — esperado nas rodadas antes da
          # publicacao do SGB. Sai verde; a proxima rodada horaria tenta de novo.
          echo "ℹ️ Nenhum boletim novo nesta passada. Próxima tentativa no próximo horário agendado (de hora em hora até quarta)."
          exit 0
